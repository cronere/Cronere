<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8EF7"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F8EF7"/>
      <stop offset="100%" style="stop-color:#7CB9FF"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: stylized cron bracket + checkmark -->
  <g transform="translate(8, 12)">
    <!-- Outer rounded square background -->
    <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#iconGrad)"/>

    <!-- Cron bracket left -->
    <path d="M14 18 L9 28 L14 38" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

    <!-- Cron bracket right -->
    <path d="M42 18 L47 28 L42 38" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

    <!-- Checkmark / pulse line in center -->
    <path d="M19 28 L24 28 L27 21 L30 35 L33 28 L37 28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <text x="80" y="51" font-family="'Syne', 'Inter', sans-serif" font-size="34" font-weight="700" letter-spacing="-1" fill="#0f0f0f">cron</text>
  <text x="156" y="51" font-family="'Syne', 'Inter', sans-serif" font-size="34" font-weight="700" letter-spacing="-1" fill="url(#accentGrad)">e</text>
  <text x="174" y="51" font-family="'Syne', 'Inter', sans-serif" font-size="34" font-weight="700" letter-spacing="-1" fill="#0f0f0f">re</text>

  <!-- Tagline -->
  <text x="81" y="67" font-family="'DM Sans', 'Inter', sans-serif" font-size="11" font-weight="400" letter-spacing="0.08em" fill="#888" text-transform="uppercase">YOUR HIRING INBOX, HANDLED.</text>
</svg>
